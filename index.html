// ─── Helpers ───
function $(sel) { return document.querySelector(sel); }
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === "style" && typeof attrs[k] === "object") {
      Object.keys(attrs[k]).forEach(function(s) { e.style[s] = attrs[k][s]; });
    } else if (k === "className") { e.className = attrs[k]; }
    else if (k.indexOf("on") === 0) { e.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
    else { e.setAttribute(k, attrs[k]); }
  });
  if (children != null) {
    if (Array.isArray(children)) children.forEach(function(c) { if (c != null) e.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    else if (typeof children === "string") e.textContent = children;
    else e.appendChild(children);
  }
  return e;
}

function svgEl(tag, attrs) {
  var e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  if (attrs) Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
  return e;
}

function kitSVG(team, size) {
  size = size || 20;
  var k = KITS[team] || {bg:"#888",sleeve:"#888",accent:"#fff",pattern:"plain"};
  var w = size, h = Math.round(size * 1.15);
  var body = "M"+(w*.15)+","+(h*.35)+" L"+(w*.05)+","+(h*.15)+" L"+(w*.25)+","+(h*.05)+" L"+(w*.38)+","+(h*.18)+" L"+(w*.5)+","+(h*.12)+" L"+(w*.62)+","+(h*.18)+" L"+(w*.75)+","+(h*.05)+" L"+(w*.95)+","+(h*.15)+" L"+(w*.85)+","+(h*.35)+" L"+(w*.82)+","+(h*.95)+" L"+(w*.18)+","+(h*.95)+" Z";
  var sleeveL = "M"+(w*.15)+","+(h*.35)+" L"+(w*.05)+","+(h*.15)+" L"+(w*.25)+","+(h*.05)+" L"+(w*.38)+","+(h*.18)+" Z";
  var sleeveR = "M"+(w*.85)+","+(h*.35)+" L"+(w*.95)+","+(h*.15)+" L"+(w*.75)+","+(h*.05)+" L"+(w*.62)+","+(h*.18)+" Z";
  var svg = svgEl("svg", {width:w, height:h, viewBox:"0 0 "+w+" "+h});
  svg.style.flexShrink = "0";
  var bodyPath = svgEl("path", {d:body, fill:k.bg, stroke:"#c4a26530", "stroke-width":"0.5"});
  svg.appendChild(bodyPath);
  var p = k.pattern, a = k.accent || "#fff";
  if (p === "sleeve") {
    var sl = svgEl("path", {d:sleeveL, fill:k.sleeve, opacity:"0.9"});
    var sr = svgEl("path", {d:sleeveR, fill:k.sleeve, opacity:"0.9"});
    svg.appendChild(sl); svg.appendChild(sr);
  }
  if (p === "vstripes") [.30,.45,.60].forEach(function(x) { svg.appendChild(svgEl("line", {x1:w*x, y1:h*.18, x2:w*x, y2:h*.92, stroke:a, "stroke-width":"1.5", "stroke-opacity":"0.7"})); });
  if (p === "hstripes") [.35,.50,.65,.80].forEach(function(y) { svg.appendChild(svgEl("line", {x1:w*.2, y1:h*y, x2:w*.8, y2:h*y, stroke:a, "stroke-width":"1.8", "stroke-opacity":"0.7"})); });
  if (p === "hstripe1") svg.appendChild(svgEl("line", {x1:w*.2, y1:h*.45, x2:w*.8, y2:h*.45, stroke:a, "stroke-width":"3", "stroke-opacity":"0.8"}));
  if (p === "brustring") svg.appendChild(svgEl("path", {d:"M"+(w*.18)+","+(h*.38)+" Q"+(w*.5)+","+(h*.32)+" "+(w*.82)+","+(h*.38)+" L"+(w*.82)+","+(h*.48)+" Q"+(w*.5)+","+(h*.42)+" "+(w*.18)+","+(h*.48)+" Z", fill:a, opacity:"0.85"}));
  if (p === "shoulder") {
    svg.appendChild(svgEl("path", {d:sleeveL, fill:a, opacity:"0.6"}));
    svg.appendChild(svgEl("path", {d:sleeveR, fill:a, opacity:"0.6"}));
  }
  if (p === "diagonal") svg.appendChild(svgEl("line", {x1:w*.15, y1:h*.7, x2:w*.85, y2:h*.25, stroke:a, "stroke-width":"3", "stroke-opacity":"0.5"}));
  return svg;
}

function loadReports() { try { var d = localStorage.getItem(KEY); if (d) state.reports = JSON.parse(d); } catch(e) {} }
function persist() { try { localStorage.setItem(KEY, JSON.stringify(state.reports)); } catch(e) {} }

// ─── Export ───
function buildExport(reps) {
  return reps.map(function(r) {
    var t = "\u26bd " + r.homeTeam + " vs " + r.awayTeam + "\n";
    t += "\ud83d\udcc5 ST " + r.matchday + " | " + (r.matchDate || "") + "\n";
    t += "\ud83c\udfaf Erwartete Tore: " + r.expectedHomeGoals.toFixed(1) + " : " + r.expectedAwayGoals.toFixed(1) + "\n";
    if (r.tags && r.tags.length) t += "\ud83c\udff7\ufe0f " + r.tags.join(", ") + "\n";
    t += "\ud83d\udcaa Heim: Ang=" + r.homeAttack + " MF=" + r.homeMidfield + " Def=" + r.homeDefense + " Mot=" + r.homeMotivation + "\n";
    t += "\ud83d\udcaa Gast: Ang=" + r.awayAttack + " MF=" + r.awayMidfield + " Def=" + r.awayDefense + " Mot=" + r.awayMotivation + "\n";
    if (r.homeFormation) t += "\ud83d\udccb " + r.homeFormation + " vs " + r.awayFormation + "\n";
    if (r.tacticalMatchup) t += "\ud83d\udccb " + r.tacticalMatchup + "\n";
    if (r.keyDuel) t += "\u2694\ufe0f " + r.keyDuel + "\n";
    if (r.homeKeyAbsence) t += "\ud83d\ude91 Heim: " + r.homeKeyAbsence + "\n";
    if (r.awayKeyAbsence) t += "\ud83d\ude91 Gast: " + r.awayKeyAbsence + "\n";
    t += "\ud83d\udcca Tendenz: " + (r.tendency==="H"?"Heim":r.tendency==="D"?"Draw":"Gast") + " (" + r.tendencyConfidence + "/5)\n";
    if (r.betRecommendation !== "Kein Bet") t += "\ud83d\udcb0 Bet: " + r.betRecommendation + (r.betMinOdds ? " @" + r.betMinOdds + "+" : "") + "\n";
    if (r.betRecommendation2 && r.betRecommendation2 !== "Kein Bet") t += "\ud83d\udcb0 Bet2: " + r.betRecommendation2 + (r.betMinOdds2 ? " @" + r.betMinOdds2 + "+" : "") + "\n";
    if (r.betReasoning) t += "\ud83d\udcac " + r.betReasoning + "\n";
    return t;
  }).join("\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\n");
}

function doExport(mode) {

  box.appendChild(el("div", {style:{fontSize:"10px",color:"#c4a26540",marginBottom:"2px"}}, "ERWARTETES ERGEBNIS"));
  var score = el("div", {style:{fontSize:"34px",fontWeight:"800",letterSpacing:"4px",fontFamily:"Georgia",background:"linear-gradient(135deg,#6aad55,#c4a265,#c47070)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}});
  score.textContent = f.expectedHomeGoals.toFixed(1) + " : " + f.expectedAwayGoals.toFixed(1);
  box.appendChild(score);
  box.appendChild(el("div", {style:{fontSize:"10px",color:"#c4a26540"}}, "\u00d8 Total: " + tot.toFixed(1)));
  card.appendChild(box);
  return card;
}

// ─── Step 2: Tags ───
function renderStep2() {
  var f = state.f;
  var card = el("div", {className:"card"});
  card.appendChild(el("div", {className:"lbl"}, "KONTEXT-TAGS (max. 3)"));
  card.appendChild(el("div", {style:{fontSize:"12px",color:"#c4a26560",marginBottom:"12px"}}, "Was pr\u00e4gt dieses Spiel?"));
  var wrap = el("div", {style:{display:"flex",flexWrap:"wrap",gap:"6px"}});
  TAGS.forEach(function(t) {
    var on = f.tags.indexOf(t.id) !== -1;
    var tag = el("div", {className:"tag " + (on ? "tag-on" : "tag-off"), onClick:function(){
      var idx = state.f.tags.indexOf(t.id);
      if (idx !== -1) state.f.tags.splice(idx, 1);
      else if (state.f.tags.length < 3) state.f.tags.push(t.id);
      render();
    }});
    tag.appendChild(el("span", null, t.icon));
    var info = el("div");
    info.appendChild(el("div", {style:{fontSize:"11px"}}, t.label));
    info.appendChild(el("div", {style:{fontSize:"8px",opacity:"0.6"}}, t.desc));
    tag.appendChild(info);
    wrap.appendChild(tag);
  });
  card.appendChild(wrap);
  if (f.tags.length === 3) card.appendChild(el("div", {style:{fontSize:"11px",color:"#c47070",marginTop:"6px"}}, "Maximum erreicht"));
  return card;
}

// ─── Step 3: Ratings ───
function renderStep3() {
  var f = state.f;
  var card = el("div", {className:"card"});
  card.appendChild(el("div", {className:"lbl"}, f.homeTeam || "HEIM"));
  card.appendChild(renderDots("ANGRIFF", f.homeAttack, "#6aad55", 10, function(v){state.f.homeAttack=v;render();}));
  card.appendChild(renderDots("MITTELFELD", f.homeMidfield, "#c4a265", 10, function(v){state.f.homeMidfield=v;render();}));
  card.appendChild(renderDots("ABWEHR", f.homeDefense, "#5a8cc4", 10, function(v){state.f.homeDefense=v;render();}));
  card.appendChild(renderDots("MOTIVATION", f.homeMotivation, "#d4b86a", 10, function(v){state.f.homeMotivation=v;render();}));
  card.appendChild(el("div", {className:"lbl", style:{marginTop:"16px"}}, f.awayTeam || "GAST"));
  card.appendChild(renderDots("ANGRIFF", f.awayAttack, "#6aad55", 10, function(v){state.f.awayAttack=v;render();}));
  card.appendChild(renderDots("MITTELFELD", f.awayMidfield, "#c4a265", 10, function(v){state.f.awayMidfield=v;render();}));
  card.appendChild(renderDots("ABWEHR", f.awayDefense, "#5a8cc4", 10, function(v){state.f.awayDefense=v;render();}));
  card.appendChild(renderDots("MOTIVATION", f.awayMotivation, "#d4b86a", 10, function(v){state.f.awayMotivation=v;render();}));
  return card;
}

// ─── Step 4: Tactics ───
function renderStep4() {
  var f = state.f;
  var card = el("div", {className:"card"});
  card.appendChild(el("div", {className:"lbl"}, "TAKTIK & KONTEXT"));
  var row = el("div", {style:{display:"flex",gap:"10px",marginBottom:"10px"}});
  var lf = el("div", {style:{flex:"1"}});
  lf.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Formation Heim"));
  var selH = el("select", {className:"sel"});
  FORMATIONS.forEach(function(x) { var o = el("option", null, x); if (x===f.homeFormation) o.selected=true; selH.appendChild(o); });
  selH.addEventListener("change", function(e){state.f.homeFormation=e.target.value;});
  lf.appendChild(selH);
  row.appendChild(lf);
  var rf = el("div", {style:{flex:"1"}});
  rf.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Formation Gast"));
  var selA = el("select", {className:"sel"});
  FORMATIONS.forEach(function(x) { var o = el("option", null, x); if (x===f.awayFormation) o.selected=true; selA.appendChild(o); });
  selA.addEventListener("change", function(e){state.f.awayFormation=e.target.value;});
  rf.appendChild(selA);
  row.appendChild(rf);
  card.appendChild(row);

  card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Taktisches Matchup"));
  var ta = el("textarea", {className:"ta", placeholder:"z.B. Heim presst hoch, Gast kontert..."});
  ta.value = f.tacticalMatchup; ta.addEventListener("input", function(e){state.f.tacticalMatchup=e.target.value;});
  card.appendChild(ta);

  card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Schl\u00fcsselduell"));
  var kd = el("input", {className:"inp", placeholder:"z.B. St\u00fcrmer X vs IV Y", value:f.keyDuel});
  kd.addEventListener("input", function(e){state.f.keyDuel=e.target.value;});
  card.appendChild(kd);

  card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Ausf\u00e4lle Heim"));
  var ha = el("input", {className:"inp", placeholder:"z.B. Kapit\u00e4n gesperrt", value:f.homeKeyAbsence});
  ha.addEventListener("input", function(e){state.f.homeKeyAbsence=e.target.value;});
  card.appendChild(ha);

  card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Ausf\u00e4lle Gast"));
  var aa = el("input", {className:"inp", placeholder:"z.B. Torwart erk\u00e4ltet", value:f.awayKeyAbsence});
  aa.addEventListener("input", function(e){state.f.awayKeyAbsence=e.target.value;});
  card.appendChild(aa);

  card.appendChild(renderDots("FAN-FAKTOR HEIM", f.homeFanFactor, "#d4b86a", 10, function(v){state.f.homeFanFactor=v;render();}));
  return card;
}

// ─── Step 5: Bet ───
function renderStep5() {
  var f = state.f;
  var card = el("div", {className:"card"});
  card.appendChild(el("div", {className:"lbl"}, "DEINE EINSCH\u00c4TZUNG"));
  card.appendChild(el("div", {style:{fontSize:"12px",color:"#c4a26570",marginBottom:"10px"}}, "Wer gewinnt?"));

  var tendRow = el("div", {style:{display:"flex",gap:"6px",marginBottom:"16px"}});
  [["H","\ud83c\udfe0 Heim"],["D","\ud83e\udd1d Draw"],["A","\u2708\ufe0f Gast"]].forEach(function(x) {
    var v = x[0], l = x[1];
    var on = f.tendency === v;
    var col = v==="H"?"#5a8c4a":v==="D"?"#c4a265":"#c47070";
    var tcol = v==="H"?"#6aad55":v==="D"?"#d4b86a":"#c47070";
    tendRow.appendChild(el("div", {
      style:{flex:"1",padding:"12px 6px",borderRadius:"8px",cursor:"pointer",textAlign:"center",fontSize:"14px",fontWeight:"700",background:on?col+"20":"#0d0a07",border:"2px solid "+(on?col:"#c4a26518"),color:on?tcol:"#c4a26540"},
      onClick:function(){state.f.tendency=v;render();}
    }, l));
  });
  card.appendChild(tendRow);

  card.appendChild(el("div", {style:{fontSize:"12px",color:"#c4a26570",marginBottom:"6px"}}, "Konfidenz (1\u20135)"));
  var confRow = el("div", {style:{display:"flex",gap:"6px",marginBottom:"16px"}});
  for (var i = 1; i <= 5; i++) {
    (function(v) {
      var on = v <= f.tendencyConfidence;
      confRow.appendChild(el("div", {
        style:{flex:"1",padding:"8px 0",textAlign:"center",borderRadius:"8px",cursor:"pointer",background:on?"#c4a26520":"#0d0a07",border:"1.5px solid "+(on?"#c4a265":"#c4a26520"),color:on?"#c4a265":"#c4a26540",fontSize:"16px",fontWeight:"700"},
        onClick:function(){state.f.tendencyConfidence=v;render();}
      }, String(v)));
    })(i);
  }
  card.appendChild(confRow);

  card.appendChild(el("div", {className:"lbl", style:{marginTop:"16px"}}, "WETT-EMPFEHLUNG"));
  card.appendChild(betSelect(f.betRecommendation, function(v){state.f.betRecommendation=v;render();}));

  if (f.betRecommendation !== "Kein Bet") {
    card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Minimum Quote"));
    var moInp = el("input", {className:"inp", type:"number", step:"0.05", placeholder:"z.B. 1.80", value:f.betMinOdds});
    moInp.addEventListener("input", function(e){state.f.betMinOdds=e.target.value;});
    card.appendChild(moInp);

    card.appendChild(el("div", {className:"lbl", style:{marginTop:"12px"}}, "2. WETTE (optional)"));
    card.appendChild(betSelect(f.betRecommendation2 || "Kein Bet", function(v){state.f.betRecommendation2=v;render();}));

    if (f.betRecommendation2 && f.betRecommendation2 !== "Kein Bet") {
      card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Min. Quote 2. Wette"));
      var mo2 = el("input", {className:"inp", type:"number", step:"0.05", placeholder:"z.B. 2.10", value:f.betMinOdds2||""});
      mo2.addEventListener("input", function(e){state.f.betMinOdds2=e.target.value;});
      card.appendChild(mo2);
    }
  }

  card.appendChild(el("label", {style:{fontSize:"10px",color:"#c4a26550"}}, "Begr\u00fcndung"));
  var brTa = el("textarea", {className:"ta", placeholder:"Warum diese Einsch\u00e4tzung?"});
  brTa.value = f.betReasoning;
  brTa.addEventListener("input", function(e){state.f.betReasoning=e.target.value;});
  card.appendChild(brTa);
  return card;
}

// ─── Init ───
loadReports();
render();
</script>
</body>
</html>
